name: Daily Supplier Catalog Sync

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape Pat's Guitars catalog
        run: python scrape_patsguitars.py

      - name: Commit updated listings
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add patsguitars_listings.csv patsguitars_listings.xlsx patsguitars_refurbed_import.csv
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update Pat's Guitars catalog $(date -u +%Y-%m-%d)"
            git push
          fi
